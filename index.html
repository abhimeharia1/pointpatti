<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teen Patti Score Manager</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:20px;
}
.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}
input,button{
    padding:10px;
    margin:5px;
    box-sizing:border-box;
}
input{
    max-width:160px;
}
select{
    padding:10px;
    margin:5px;
    box-sizing:border-box;
}
button{
    cursor:pointer;
    border:1px solid #bbb;
    border-radius:5px;
    background:#fff;
}
button:hover:not(:disabled){
    background:#f0f0f0;
}
button:disabled{
    cursor:not-allowed;
    opacity:0.5;
}
.round-box{
    margin:15px 0;
    padding:12px;
    background:#f7f7f7;
    border:1px solid #ddd;
    border-radius:8px;
}
.round-box h3{
    margin:0 0 10px;
}
.table-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
}
table{
    width:100%;
    min-width:900px;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #ccc;
    padding:8px 6px;
    text-align:center;
    font-size:14px;
    white-space:nowrap;
}
th{
    background:#333;
    color:white;
}
.active-round{
    background:#fff3cd;
    font-weight:bold;
}
.winner-row td{
    background:#e8f5e9;
    font-weight:bold;
}
.total-table{
    min-width:0;
}
.message{
    display:none;
    width:100%;
    margin:8px 0;
    padding:8px 10px;
    border-radius:6px;
    background:#fff3cd;
    color:#664d03;
    box-sizing:border-box;
}
.mobile-label{
    display:none;
}
.player-mobile-label{
    display:none;
}
@media(max-width:600px){
    body{
        margin:10px;
    }
    .container{
        padding:14px;
    }
    .container.controls{
        display:flex;
        flex-wrap:wrap;
        align-items:center;
        gap:0;
    }
    h2{
        font-size:22px;
        flex-basis:100%;
    }
    hr{
        width:100%;
        order:5;
    }
    input,select{
        width:auto;
        max-width:130px;
        margin:5px;
    }
    button{
        width:auto;
        min-height:0;
        padding:7px 8px;
        margin:4px;
        font-size:13px;
        vertical-align:top;
    }
    #undoBtn,#redoBtn{
        width:auto;
    }
    button[onclick="resetGame()"]{
        width:auto;
    }
    .compact-action .desktop-label{
        display:none;
    }
    .compact-action .mobile-label{
        display:inline;
    }
    .player-desktop-label{
        display:none;
    }
    .player-mobile-label{
        display:inline;
    }
    #playerName{
        order:1;
        max-width:120px;
    }
    button[onclick="addPlayer()"]{
        order:2;
    }
    #undoBtn{
        order:3;
    }
    #redoBtn{
        order:4;
    }
    .round-box{
        order:6;
        width:100%;
        padding:10px;
        margin:10px 0;
    }
    .round-box h3{
        font-size:16px;
        margin-bottom:6px;
    }
    .round-box button{
        min-width:38px;
        padding:7px 10px;
    }
    #playerSelect{
        order:7;
        max-width:125px;
    }
    #points{
        order:8;
        max-width:90px;
    }
    button[onclick="addPoints()"]{
        order:9;
    }
    button[onclick="subtractPoints()"]{
        order:10;
    }
    button[onclick="resetGame()"]{
        order:11;
    }
    #gameMode{
        order:12;
        max-width:none;
        width:100%;
        margin:6px 0;
    }
    h3,.table-wrap,.total-table{
        order:14;
        width:100%;
    }
    #message{
        order:13;
    }
    table{
        min-width:640px;
    }
    .total-table{
        min-width:0;
    }
    th,td{
        padding:7px 5px;
        font-size:13px;
    }
}
</style>
</head>

<body>

<div class="container controls">

<h2>🃏 Score Manager</h2>

<input id="playerName" placeholder="Player Name">
<button onclick="addPlayer()" title="Add Player"><span class="player-desktop-label">Add Player</span><span class="player-mobile-label">＋ Player</span></button>

<hr>

<div class="round-box">
<h3>Round: <span id="roundCount">1</span> / <span id="totalRoundCount">10</span></h3>
<button id="prevRoundBtn" class="compact-action" onclick="previousRound()" title="Previous Round"><span class="desktop-label">Previous Round</span><span class="mobile-label">‹</span></button>
<button id="nextRoundBtn" class="compact-action" onclick="nextRound()" title="Next Round"><span class="desktop-label">Next Round</span><span class="mobile-label">›</span></button>
<button class="compact-action" onclick="addRound()" title="Add Round"><span class="desktop-label">Add Round</span><span class="mobile-label">＋</span></button>
<button id="removeRoundBtn" class="compact-action" onclick="removeRound()" title="Remove Round"><span class="desktop-label">Remove Round</span><span class="mobile-label">−</span></button>
</div>

<select id="playerSelect"></select>

<input type="number" id="points" placeholder="Points">

<button class="compact-action" onclick="addPoints()" title="Add Points"><span class="desktop-label">Add Points</span><span class="mobile-label">＋</span></button>

<button class="compact-action" onclick="subtractPoints()" title="Subtract Points"><span class="desktop-label">Subtract Points</span><span class="mobile-label">−</span></button>

<button id="undoBtn" onclick="undoAction()" title="Undo" disabled>↶</button>

<button id="redoBtn" onclick="redoAction()" title="Redo" disabled>↷</button>

<button onclick="resetGame()" title="Reset Game">Reset</button>

<select id="gameMode" onchange="changeGameMode()">
<option value="minimum">Minimum score wins</option>
<option value="maximum">Maximum score wins</option>
</select>

<div id="message" class="message"></div>

<h3>Round Scores</h3>
<div class="table-wrap">
<table>

<thead id="scoreHead">
<tr>
<th>Player</th>
<th>Round 1</th>
</tr>
</thead>

<tbody id="scoreTable">

</tbody>

</table>
</div>

<h3>Total Scores</h3>
<table class="total-table">

<thead>
<tr>
<th>Player</th>
<th>Total Points</th>
</tr>
</thead>

<tbody id="totalTable">

</tbody>

</table>

</div>

<script>

let players=[];
let round=1;
let totalRounds=10;
let gameMode="minimum";
let undoStack=[];
let redoStack=[];

function getState(){
return {
players:players.map(player=>({
name:player.name,
score:player.score,
rounds:[...(player.rounds || [])]
})),
round:round,
totalRounds:totalRounds,
gameMode:gameMode
};
}

function setState(state){
players=state.players.map(player=>({
name:player.name,
score:player.score,
rounds:[...(player.rounds || [])]
}));
round=state.round;
totalRounds=state.totalRounds;
gameMode=state.gameMode || "minimum";
render();
}

function saveState(){
undoStack.push(getState());
redoStack=[];
updateHistoryButtons();
}

function undoAction(){
if(undoStack.length==0) return;
redoStack.push(getState());
setState(undoStack.pop());
}

function redoAction(){
if(redoStack.length==0) return;
undoStack.push(getState());
setState(redoStack.pop());
}

function updateHistoryButtons(){
document.getElementById("undoBtn").disabled=undoStack.length==0;
document.getElementById("redoBtn").disabled=redoStack.length==0;
}

function showMessage(text){
let message=document.getElementById("message");
message.textContent=text;
message.style.display="block";
}

function clearMessage(){
let message=document.getElementById("message");
message.textContent="";
message.style.display="none";
}

function changeGameMode(){
let selectedMode=document.getElementById("gameMode").value;

if(selectedMode==gameMode) return;

saveState();

gameMode=selectedMode;

render();

}

function ensurePlayerRounds(){
players.forEach(player=>{
if(!player.rounds) player.rounds=[];
while(player.rounds.length<totalRounds){
player.rounds.push(0);
}
if(player.rounds.length>totalRounds){
player.rounds.length=totalRounds;
}
player.score=player.rounds.reduce((total,value)=>total+value,0);
});
}

function addPlayer(){

let name=document.getElementById("playerName").value.trim();

if(name==""){
showMessage("Enter player name.");
return;
}

if(players.some(player=>player.name.toLowerCase()==name.toLowerCase())){
showMessage("Player already exists.");
return;
}

saveState();

players.push({name:name,score:0,rounds:Array(totalRounds).fill(0)});

document.getElementById("playerName").value="";

clearMessage();

render();

}

function addPoints(){

let i=document.getElementById("playerSelect").value;

let p=Number(document.getElementById("points").value);

if(players.length==0){
showMessage("Add player first.");
return;
}

if(document.getElementById("points").value=="" || isNaN(p)){
showMessage("Enter points.");
return;
}

saveState();

players[i].rounds[round-1]+=p;
players[i].score+=p;

document.getElementById("points").value="";
clearMessage();

render();

}

function subtractPoints(){

let i=document.getElementById("playerSelect").value;

let p=Number(document.getElementById("points").value);

if(players.length==0){
showMessage("Add player first.");
return;
}

if(document.getElementById("points").value=="" || isNaN(p)){
showMessage("Enter points.");
return;
}

saveState();

players[i].rounds[round-1]-=p;
players[i].score-=p;

document.getElementById("points").value="";
clearMessage();

render();

}

function nextRound(){

if(round<totalRounds){
saveState();
round++;
}

render();

}

function previousRound(){

if(round>1){
saveState();
round--;
}

render();

}

function addRound(){

saveState();

totalRounds++;

ensurePlayerRounds();

render();

}

function removeRound(){

if(totalRounds<=1) return;

saveState();

totalRounds--;

if(round>totalRounds){
round=totalRounds;
}

ensurePlayerRounds();

render();

}

function resetGame(){

if(confirm("Reset all scores?")){

saveState();

players.forEach(x=>x.score=0);
players.forEach(x=>x.rounds=Array(totalRounds).fill(0));

render();

}

}

function render(){

document.getElementById("roundCount").innerText=round;
document.getElementById("totalRoundCount").innerText=totalRounds;
document.getElementById("prevRoundBtn").disabled=round<=1;
document.getElementById("nextRoundBtn").disabled=round>=totalRounds;
document.getElementById("removeRoundBtn").disabled=totalRounds<=1;
document.getElementById("gameMode").value=gameMode;

ensurePlayerRounds();

let table=document.getElementById("scoreTable");

table.innerHTML="";

let totalTable=document.getElementById("totalTable");

totalTable.innerHTML="";

let head=document.getElementById("scoreHead");

let roundHeadings="";

for(let i=1;i<=totalRounds;i++){
let headingClass=i==round ? "active-round" : "";
roundHeadings+=`<th class="${headingClass}">Round ${i}</th>`;
}

head.innerHTML=`
<tr>
<th>Player</th>
${roundHeadings}
</tr>`;

let select=document.getElementById("playerSelect");
let selectedPlayer=select.value;

select.innerHTML="";

let winningScore=gameMode=="minimum"
? Math.min(...players.map(player=>player.score))
: Math.max(...players.map(player=>player.score));

players.forEach((p,index)=>{

let roundCells="";

for(let i=0;i<totalRounds;i++){
let cellClass=i==round-1 ? "active-round" : "";
roundCells+=`<td class="${cellClass}">${p.rounds[i]}</td>`;
}

table.innerHTML+=`
<tr>
<td>${p.name}</td>
${roundCells}
</tr>`;

let winnerClass=players.length>1 && p.score==winningScore ? "winner-row" : "";

totalTable.innerHTML+=`
<tr class="${winnerClass}">
<td>${p.name}</td>
<td>${p.score}</td>
</tr>`;

select.innerHTML+=`
<option value="${index}">
${p.name}
</option>`;

});

if(players[selectedPlayer]){
select.value=selectedPlayer;
}

updateHistoryButtons();

}

document.getElementById("playerName").addEventListener("keydown",function(e){
if(e.key=="Enter"){
addPlayer();
}
});

document.getElementById("points").addEventListener("keydown",function(e){
if(e.key=="Enter"){
addPoints();
}
});

render();

</script>

</body>
</html>
